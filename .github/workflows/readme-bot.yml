name: README Bot

on:
  push:
    branches: [main]

permissions:
  contents: write    

jobs:
  fix-readme:
    if: github.actor != 'readme-fix[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Generate App Token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run README bot
        run: node src/index.js

      - name: Commit changes
        run: |
          git config user.name "aryan-readme-bot[bot]"
          git config user.email "aryan-readme-bot[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Auto-update README" || exit 0

          git push https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}